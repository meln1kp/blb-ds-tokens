name: Sync Figma Tokens

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  # On-demand push
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Check secrets and variables
        run: |
          echo "FIGMA_TOKEN set:    ${{ secrets.FIGMA_TOKEN != '' }}"
          echo "FIGMA_FILE_KEY set: ${{ vars.FIGMA_FILE_KEY != '' }}"
          echo "FIGMA_FILE_KEY val: ${{ vars.FIGMA_FILE_KEY }}"

      - name: Fetch tokens from Figma
        run: node scripts/fetch-tokens.js
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ vars.FIGMA_FILE_KEY }}

      - name: Build CSS
        run: node scripts/build-tokens.js

      - name: Commit dist/ if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync tokens from Figma [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
