name: Build Tokens

on:
  # Fires when the Figma plugin pushes token JSON to main
  push:
    branches: [main]
    paths: ['tokens/**']
  # Manual trigger for one-off rebuilds
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build CSS from tokens
        run: node scripts/build-tokens.js

      - name: Commit dist/ if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          if ! git diff --staged --quiet; then
            git commit -m "chore: build tokens [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
